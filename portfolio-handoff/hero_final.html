<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero - Domain Warp</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:-apple-system,"Helvetica Neue",sans-serif;}
  #c{display:block;width:100vw;height:100vh;}
  .overlay{position:fixed;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;pointer-events:none;}
  /* mode A: fixed gradient text */
  .overlay.grad .name{
    background:linear-gradient(120deg,#eafcff 0%,#bfefff 35%,#8fd7ff 65%,#c9b8ff 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 2px 20px rgba(120,200,255,.35));}
  .overlay.grad .sub{color:#dff6ff;opacity:.85;text-shadow:0 1px 12px rgba(80,160,220,.5);}
  /* mode B: soft white (unused, kept minimal) */
  .name{font-size:clamp(2.5rem,9vw,7rem);font-weight:800;letter-spacing:.05em;margin:0;}
  .sub{font-size:clamp(.8rem,2vw,1.1rem);letter-spacing:.35em;margin-top:1rem;text-transform:uppercase;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="overlay grad" id="overlay">
  <h1 class="name">髙柳海斗</h1>
  <p class="sub">jack &middot; graphics &middot; mathematics</p>
</div>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', {antialias:false, powerPreference:'high-performance'});
if(!gl){ document.body.innerHTML = '<p style="color:#fff;padding:2rem">WebGL2 not supported</p>'; }

const vert = `#version 300 es
in vec2 p; void main(){ gl_Position = vec4(p,0.,1.); }`;

const frag = `#version 300 es
precision highp float;
out vec4 o;
uniform vec2 uRes;
uniform float uTime;
uniform vec2 uMouse;     // 0..1
uniform float uWarp;

// --- hash / value noise / fBM ---
float hash(vec2 p){ p=fract(p*vec2(123.34,456.21)); p+=dot(p,p+45.32); return fract(p.x*p.y); }
float noise(vec2 p){
  vec2 i=floor(p), f=fract(p);
  vec2 u=f*f*(3.-2.*f);
  return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),
             mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y);
}
float fbm(vec2 p){
  float v=0., a=.5;
  for(int i=0;i<5;i++){ v+=a*noise(p); p*=2.02; a*=.5; }
  return v;
}

// iq palette
vec3 pal(float t, vec3 a, vec3 b, vec3 c, vec3 d){ return a+b*cos(6.28318*(c*t+d)); }
vec3 palette(float t){
  return pal(t, vec3(.15,.45,.55),vec3(.55,.5,.5),vec3(1.,1.,1.),vec3(0.,.12,.22)); // teal/cyan deep
}

void main(){
  vec2 uv = (gl_FragCoord.xy - .5*uRes)/uRes.y;
  float t = uTime;

  // mouse influence
  vec2 m = (uMouse - .5) * 2.0;
  uv += m * 0.15;

  float warpAmt = uWarp;
  // domain warping (iq style): q -> r -> final  (time係数強め = speed感マシマシ)
  vec2 q = vec2(fbm(uv + vec2(0.0,0.0) + t*0.25),
                fbm(uv + vec2(5.2,1.3) - t*0.25));
  vec2 r = vec2(fbm(uv + warpAmt*q + vec2(1.7,9.2) + t*0.4 + m*0.5),
                fbm(uv + warpAmt*q + vec2(8.3,2.8) - t*0.33 + m*0.4));
  float f = fbm(uv + warpAmt*r + 0.3*sin(t*0.2+r.yx*3.0));

  vec3 col = palette(f + t*0.05 + length(r)*0.3);
  col = mix(col, palette(dot(r,r)), clamp(dot(q,q),0.,1.));
  col *= 0.6 + 0.6*f;             // contrast
  col += 0.08*length(r);          // subtle glow

  // vignette
  vec2 vg = gl_FragCoord.xy/uRes;
  col *= 0.5 + 0.5*pow(16.*vg.x*vg.y*(1.-vg.x)*(1.-vg.y), 0.25);

  o = vec4(col,1.);
}`;

function sh(type,src){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s)); return s; }
const prog = gl.createProgram();
gl.attachShader(prog,sh(gl.VERTEX_SHADER,vert));
gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,frag));
gl.linkProgram(prog); gl.useProgram(prog);

const buf=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
const loc=gl.getAttribLocation(prog,'p'); gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);

const U = {
  res:gl.getUniformLocation(prog,'uRes'),
  time:gl.getUniformLocation(prog,'uTime'),
  mouse:gl.getUniformLocation(prog,'uMouse'),
  warp:gl.getUniformLocation(prog,'uWarp'),
};

let mouse=[.5,.5], mTarget=[.5,.5], warp=1.5, speed=0.85, tAccum=0, last=performance.now();
const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;

function resize(){
  const dpr=Math.min(devicePixelRatio, innerWidth<700?1.2:2);
  canvas.width=innerWidth*dpr; canvas.height=innerHeight*dpr;
  gl.viewport(0,0,canvas.width,canvas.height);
}
addEventListener('resize',resize); resize();

addEventListener('pointermove',e=>{ mTarget=[e.clientX/innerWidth, 1-e.clientY/innerHeight]; });

function frame(now){
  const dt=Math.min((now-last)/1000, .05); last=now;
  tAccum += dt*speed*(reduce?0:1);
  mouse[0]+=(mTarget[0]-mouse[0])*.05;
  mouse[1]+=(mTarget[1]-mouse[1])*.05;
  gl.uniform2f(U.res,canvas.width,canvas.height);
  gl.uniform1f(U.time,tAccum);
  gl.uniform2f(U.mouse,mouse[0],mouse[1]);
  gl.uniform1f(U.warp,warp);
  gl.drawArrays(gl.TRIANGLES,0,3);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
