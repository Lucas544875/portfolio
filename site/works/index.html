<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Works — 髙柳海斗 / jack</title>
<link rel="stylesheet" href="/src/style.css" />
<link rel="stylesheet" href="/src/components/cover-flow.css" />
</head>
<body class="no-webgl">

<a class="back-link" href="/">&larr; 戻る</a>

<main class="works-list-page">
  <h1 class="works-list-title">Works</h1>

  <!--
    サムネイルはダミー(CSSグラデーション)。実画像が用意でき次第 cf-thumb に
    background-image を差し込む形に置き換える。href もリポジトリ側のデプロイ先
    URLが決まり次第差し替え。
  -->
  <section class="cf" id="cf" aria-roledescription="carousel" aria-label="作品一覧">
    <div class="cf-stage">
      <ul class="cf-track">
        <li class="cf-item" data-title="二重振り子" data-desc="Runge-Kutta法で解く二重振り子。ドラッグで初期条件を変え、カオスの分岐を2本並列に可視化する。" data-href="https://github.com/Lucas544875" tabindex="0">
          <div class="cf-thumb cf-thumb-1"></div>
        </li>
        <li class="cf-item" data-title="Hausdorff次元 (GLSL)" data-desc="フラクタル図形をGLSLシェーダーで生成しながら、Hausdorff次元をリアルタイムに計算・表示する。" data-href="https://github.com/Lucas544875" tabindex="0">
          <div class="cf-thumb cf-thumb-2"></div>
        </li>
        <li class="cf-item" data-title="Kleeneの再帰定理" data-desc="自己言及的なプログラムがquine的に自分自身を出力する様子を実演する計算論のデモ。" data-href="https://github.com/Lucas544875" tabindex="0">
          <div class="cf-thumb cf-thumb-3"></div>
        </li>
        <li class="cf-item" data-title="マンデルバルブ" data-desc="レイマーチングで探索する3Dフラクタル。純粋なグラフィック実装力の看板作品。" data-href="https://github.com/Lucas544875" tabindex="0">
          <div class="cf-thumb cf-thumb-4"></div>
        </li>
      </ul>
    </div>

    <div class="cf-caption">
      <h2 class="cf-caption-title"></h2>
      <p class="cf-caption-desc"></p>
      <a class="cf-caption-link" href="#" target="_blank" rel="noreferrer">開く &rarr;</a>
    </div>

    <div class="cf-controls">
      <button type="button" class="cf-btn cf-prev" aria-label="前の作品へ">&lsaquo;</button>
      <button type="button" class="cf-btn cf-next" aria-label="次の作品へ">&rsaquo;</button>
    </div>
  </section>
</main>

<script type="module" src="/src/pages/works-list.js"></script>
</body>
</html>
