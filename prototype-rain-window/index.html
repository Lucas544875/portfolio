<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>雨の中の窓 — 結露プロトタイプ#2</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="glcanvas"></canvas>

  <div id="controls" class="controls">
    <button id="toggleRain" class="toggle-btn" type="button" aria-pressed="true" aria-label="雨の表示を切り替え" title="雨">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6.5 10.5a3.5 3.5 0 0 1 0-7c.35 0 .69.04 1.02.13A4.5 4.5 0 0 1 16 5.5c.17 0 .34.01.5.03A3.5 3.5 0 0 1 17 12H6.5z"/>
        <path d="M7 15.5 5.5 18M12 15.5 10.5 18M17 15.5 15.5 18"/>
      </svg>
    </button>
    <button id="toggleFog" class="toggle-btn" type="button" aria-pressed="true" aria-label="結露の表示を切り替え" title="結露">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 8.5h16"/>
        <path d="M3 12.5h18"/>
        <path d="M5 16.5h14"/>
      </svg>
    </button>
  </div>

  <div id="hint" class="hint">なぞって、曇ったガラスを拭ってみてください</div>
  <div id="fallback" class="fallback hidden">
    <p>このブラウザは WebGL2 に対応していません。<br/>最新の Chrome / Edge / Firefox でお試しください。</p>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
