<!DOCTYPE html>
<html><head>
<script id="fs" class="x-shader/x-fragment" src="mandelbox.frag" type="text/javascript"></script>

<script id="vs" class="x-shader/x-vertex" src="shader.vert" type="text/javascript"></script>

<link href="style.css" rel="stylesheet">

<script src="quaternion.js" type="text/javascript"></script>

<script src="raymarch.js" type="text/javascript"></script>

<script src="https://webglfundamentals.org/webgl/resources/webgl-utils.js"></script>

</head>
<body>
  <div id="canvasWrap">
    <canvas id="canvas"></canvas>
    <div id="fadeOverlay"></div>
  </div>
  <p><input type="checkbox" id="check" checked><label for="check"> auto run</label></p>
  <button id = "recStart"><span id = "recIcon">●</span>REC</button>
  <button id = "recStop">STOP</button>
  <p><a href="#" id="downloadlink">ダウンロード</a></p>
  <!--<p><button id = "shaderExport">エクスポート</button></p>-->
  <h2>操作説明</h2>
  <p>同じ地点へ潜り続け、精度限界に達するとフェードして次のポイントへ移ります。</p>
  <p>ドラッグで視線を回転、ホイールでズームサイクルの速度を調整できます。</p>
  <p>auto runチェックボックスからチェックを外すと画面の更新を停止します。</p>
  <p>RECボタンで録画開始、STOPボタンで録画終了。録画終了時にwebm形式の動画のダウンロードリンクが生成されます。</p>
</body>
</html>
