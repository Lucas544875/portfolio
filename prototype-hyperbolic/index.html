<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>双曲空間のレイマーチ</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="glcanvas"></canvas>
  <div id="divider"></div>

  <div id="labelLeft" class="label">EUCLIDEAN (K = 0, 固定)</div>
  <div id="labelRight" class="label">K = -1.00 — HYPERBOLIC</div>

  <div id="hint" class="hint">木の周りを自動周回・ドラッグで視点操作(ホイールで加速)</div>

  <div id="curvaturePanel" class="curvature-panel">
    <label for="curvatureSlider">曲率 K</label>
    <input type="range" id="curvatureSlider" min="-1" max="1" step="0.01" value="-1" />
    <div id="curvatureReadout" class="curvature-readout">K = -1.00 (双曲空間)</div>
  </div>

  <div id="fallback" class="fallback hidden">
    <p>このブラウザは WebGL2 に対応していません。<br/>最新の Chrome / Edge / Firefox でお試しください。</p>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
