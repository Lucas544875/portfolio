<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>VAPORWAVE — レイマーチ・グリッドの夕暮れ</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=palette" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="glcanvas"></canvas>

  <div id="controls" class="controls">
    <button id="toggleVhs" class="toggle-btn" type="button" aria-pressed="true" aria-label="VHSノイズを切り替え" title="VHSノイズ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="6" width="18" height="12" rx="2"/>
        <path d="M6 10h4M6 14h2M14 10h4M12 14h6"/>
      </svg>
    </button>
    <button id="cyclePalette" class="toggle-btn" type="button" aria-label="パレットを切り替え" title="パレット切替">
      <span class="material-symbols-outlined" aria-hidden="true">palette</span>
    </button>
  </div>

  <div id="paletteName" class="palette-name" aria-hidden="true"></div>
  <div id="hint" class="hint">スクロールで加速</div>
  <div id="fallback" class="fallback hidden">
    <p>このブラウザは WebGL2 に対応していません。<br/>最新の Chrome / Edge / Firefox でお試しください。</p>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
